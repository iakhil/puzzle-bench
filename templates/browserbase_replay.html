<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Replay</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rrweb-player@latest/dist/style.css" />
    <style>
      .replay-shell {
        display: grid;
        gap: 1rem;
      }
      .hero.compact {
        text-align: center;
      }
      #status:empty {
        display: none;
      }
      #player {
        min-height: 680px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero compact">
        <p class="eyebrow">Browser Replay</p>
        <h1>Agent Replay</h1>
      </section>

      <section class="panel replay-shell">
        <div class="panel-header">
          <h2>Replay</h2>
        </div>
        <div id="status">Loading replay…</div>
        <div id="player"></div>
      </section>

      <footer class="site-footer">
        <p>
          Want to improve Puzzle Bench?
          <a href="https://github.com/iakhil/puzzle-bench" target="_blank" rel="noreferrer">
            Contribute on GitHub
          </a>.
        </p>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/rrweb-player@latest/dist/index.js"></script>
    <script>
      async function main() {
        const status = document.getElementById("status");
        const playerRoot = document.getElementById("player");
        try {
          const response = await fetch(`/replays/browserbase/{{ session_id }}/events`);
          if (!response.ok) {
            throw new Error(`Replay request failed with ${response.status}`);
          }
          const payload = await response.json();
          const events = Array.isArray(payload)
            ? payload
            : (payload.events || payload.rrwebEvents || payload.data || []);
          if (!Array.isArray(events) || events.length === 0) {
            throw new Error("No replay events were returned.");
          }
          new rrwebPlayer({
            target: playerRoot,
            props: {
              events,
              autoPlay: true,
              speedOption: [1, 2, 4, 8],
              width: 1440,
              height: 1200
            }
          });
          status.textContent = "";
        } catch (error) {
          status.textContent = `Replay failed to load: ${error.message}`;
        }
      }
      main();
    </script>
  </body>
</html>
